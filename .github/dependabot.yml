version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      types:
        patterns: ['@types/*']
      eslint:
        patterns: ['eslint*', '@typescript-eslint/*']
      prisma:
        patterns: ['prisma', '@prisma/*']
    labels: ['dependencies']
    commit-message:
      prefix: 'chore(deps)'

  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
    labels: ['dependencies', 'infra']
    commit-message:
      prefix: 'chore(ci)'

  - package-ecosystem: docker
    directory: '/infra/docker'
    schedule:
      interval: weekly
    labels: ['dependencies', 'infra']
    commit-message:
      prefix: 'chore(docker)'
